---
layout: default
---

<div>
  {{ content }}

  <h1>Archive</h1>
  <ul class="post-list">
    {% for post in site.posts %}
    {% unless post.draft %}
    <li>
      <span class="post-meta">{{ post.date | date: site.date_format }} | </span>
      <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
    </li>
    {% endunless %}
    {% endfor %}
  </ul>
</div>

<!-- vim: set tw=90 sts=-1 sw=2 et: -->
